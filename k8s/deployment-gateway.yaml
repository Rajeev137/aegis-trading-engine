apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-gateway
  namespace: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-gateway
  template:
    metadata:
      labels:
        app: aegis-gateway
    spec:
      containers:
        - name: gateway
          image: aegis-ingestion-gateway:latest
          imagePullPolicy: Never
          env:
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: RABBITMQ_URL
            - name: PAIRS
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: PAIRS
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
