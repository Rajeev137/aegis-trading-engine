#       defined in service.yaml. The mapping is:
#         docker-compose "redis"     → K8s ClusterIP "aegis-redis"
#         docker-compose "rabbitmq"  → K8s ClusterIP "aegis-rabbitmq"
#         docker-compose "postgres"  → K8s ClusterIP "aegis-postgres"
#       All env URLs in this ConfigMap must use the K8s service names.
