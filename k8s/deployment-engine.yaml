apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-worker
  namespace: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-worker
  template:
    metadata:
      labels:
        app: aegis-worker
    spec:
      containers:
        - name: worker
          image: aegis-execution-engine:latest
          imagePullPolicy: Never        # minikube local build — no registry
          command: ["python", "-m", "app.worker"]
          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: REDIS_URL
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: RABBITMQ_URL
          livenessProbe:
            exec:
              command: ["find", "/tmp/worker_alive", "-newer", "/proc/1/cmdline"]              #     This confirms the worker consumed a message recently, catching deadlocks.
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["find", "/tmp/worker_alive", "-newer", "/proc/1/cmdline"]              #     This confirms the worker consumed a message recently, catching deadlocks.
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi