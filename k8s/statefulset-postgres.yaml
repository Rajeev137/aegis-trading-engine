apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aegis-postgres
  namespace: aegis
spec:
  serviceName: aegis-postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: aegis-postgres
  template:
    metadata:
      labels:
        app: aegis-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              subPath: postgres
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "aegis_admin", "-d", "aegis_db"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "aegis_admin", "-d", "aegis_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-postgres-headless
  namespace: aegis
spec:
  clusterIP: None
  selector:
    app: aegis-postgres
  ports:
    - port: 5432
      targetPort: 5432
