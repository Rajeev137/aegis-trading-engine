# TODO: Create a StatefulSet named "aegis-postgres" in namespace "aegis".
#
# TODO: Use StatefulSet (not Deployment) for three reasons specific to this project:
#   1. Stable DNS identity — DATABASE_URL points to "aegis-postgres"; the StatefulSet
#      headless service gives pod-level DNS (aegis-postgres-0.aegis-postgres-headless)
#      which survives pod restarts without changing the address.
#   2. Dedicated PVC per pod — volumeClaimTemplates binds one PVC permanently to pod-0,
#      surviving deletion and rescheduling. A Deployment PVC would allow two pods to
#      attempt mounting the same ReadWriteOnce volume, causing one to fail.
#   3. Ordered shutdown — StatefulSet terminates pods in reverse-ordinal order,
#      ensuring a clean Postgres shutdown before any failover logic could run.
#
# TODO: replicas: 1
#       Single primary only. Postgres HA (streaming replication, Patroni, etc.)
#       is out of scope for this scaffold.
#
# TODO: Container spec:
