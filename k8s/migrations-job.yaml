apiVersion: batch/v1
kind: Job
metadata:
  name: aegis-migrations
  namespace: aegis
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrations
          image: aegis-execution-engine:latest
          imagePullPolicy: Never
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: DATABASE_URL
