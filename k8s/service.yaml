#   selector: app: aegis-postgres
#   port: 5432 → targetPort: 5432
#   type: ClusterIP
#   This is the stable virtual IP used by DATABASE_URL in secret.yaml.
#   The StatefulSet headless service (in statefulset-postgres.yaml) provides
#   pod-level DNS on top of this for direct pod addressing if ever needed.
