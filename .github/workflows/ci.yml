name: Aegis CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup Node.js to check the Gateway
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Install Node Dependencies
      working-directory: ./ingestion-gateway
      run: npm ci

    - name: Build TypeScript Gateway
      working-directory: ./ingestion-gateway
      run: npx tsc

    # 3. Setup Python to check the Engine
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install Python Dependencies
      working-directory: ./execution-engine
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Test the Docker Builds
    - name: Verify Docker Builds
      run: |
        docker compose build api
        docker compose build gateway
        docker compose build worker