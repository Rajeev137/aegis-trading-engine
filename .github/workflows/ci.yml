name: Aegis CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup Node.js to check the Gateway
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Install Node Dependencies
      working-directory: ./ingestion-gateway
      run: npm ci

    - name: Build TypeScript Gateway
      working-directory: ./ingestion-gateway
      run: npx tsc

    # 3. Setup Python to check the Engine
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install Python Dependencies
      working-directory: ./execution-engine
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Test the Docker Builds
    - name: Verify Docker Builds
      run: |
        docker compose build api
        docker compose build gateway
        docker compose build worker

  # --- CD PIPELINE ---
  deploy-to-production:
    # Only runs if build-and-test passes first
    needs: build-and-test
    # Only deploy on push to main, not on pull requests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd aegis-trading-engine

          # Pull the latest code from GitHub
          git pull origin main

          # Rebuild and restart only changed containers
          docker compose up --build -d

          # Clean up old dangling images to save disk space
          docker image prune -f
